name: betting notify cron

on:
  schedule:
    # Hourly. The KV dedup ledger makes re-runs idempotent, so the exact tick
    # time never matters — one round notifies once for lock and once for settle.
    - cron: '0 * * * *'
  workflow_dispatch:

# Required so the workflow can read the CRON_SECRET from repo secrets
permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /api/cron/betting-notify (lock + settled)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          AUTH_HEADER=""
          if [ -n "$CRON_SECRET" ]; then
            AUTH_HEADER="Authorization: Bearer $CRON_SECRET"
          fi
          STATUS=$(curl -sS -o /tmp/betting-notify.json -w "%{http_code}" \
            -H "$AUTH_HEADER" \
            https://paddock-tracker.com/api/cron/betting-notify)
          echo "Status: $STATUS"
          cat /tmp/betting-notify.json
          echo ""
          # 503 (cron secret not configured) is acceptable while secrets are
          # being provisioned; the route 200s when betting itself is unconfigured.
          test "$STATUS" = "200" -o "$STATUS" = "503"
