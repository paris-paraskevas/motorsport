name: betting settle markets

on:
  schedule:
    # Every 3 hours (offset off the hour). Races settle a few hours after the
    # flag once the official classification posts; the route only settles a
    # market when its result is in, and is idempotent, so frequent checks are
    # cheap and catch the post-stewards result without a per-race timer.
    - cron: '47 */3 * * *'
  workflow_dispatch:

# Required so the workflow can read CRON_SECRET from repo secrets.
permissions:
  contents: read

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /api/cron/settle-markets (settle due markets)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -e
          AUTH_HEADER=""
          if [ -n "$CRON_SECRET" ]; then
            AUTH_HEADER="Authorization: Bearer $CRON_SECRET"
          fi
          STATUS=$(curl -sS -o /tmp/settle.json -w "%{http_code}" \
            -H "$AUTH_HEADER" \
            https://paddock-tracker.com/api/cron/settle-markets)
          echo "Status: $STATUS"
          cat /tmp/settle.json
          echo ""
          # 200 = ran (settled/awaiting summary in body). 503 = betting DB not
          # provisioned yet (dormant) — expected until go-live, stay green.
          # 401 (bad secret) / 500 = real failure.
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
            exit 0
          fi
          echo "Unexpected status $STATUS — failing."
          exit 1
